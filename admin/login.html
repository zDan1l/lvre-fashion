<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Admin LVRE</title>
<link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
<link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="96x96" href="../assets/favicon/favicon-96x96.png">
<link rel="manifest" href="../assets/favicon/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  :root {
    --primary-blue:   #1E5A8D;
    --dark-blue:      #0D2D4A;
    --light-blue:     #E8F4FC;
    --pure-white:     #FFFFFF;
    --off-white:      #F8F9FA;
    --light-gray:     #E9ECEF;
    --medium-gray:    #6C757D;
    --black:          #000000;
    --dark-gray:      #212529;
    --border:         #DEE2E6;
    --heading:  'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --body:     'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .login-wrapper {
    width: 100%;
    max-width: 400px;
  }

  .login-card {
    background: var(--pure-white);
    border: 1px solid var(--border);
    padding: 2rem;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .login-logo {
    font-family: var(--heading);
    font-size: 2rem;
    font-weight: 900;
    color: var(--black);
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  .login-logo span {
    color: var(--primary-blue);
  }

  .login-title {
    font-family: var(--heading);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--dark-gray);
    margin-bottom: 0.25rem;
  }

  .login-subtitle {
    font-size: 0.875rem;
    color: var(--medium-gray);
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dark-gray);
    margin-bottom: 0.5rem;
  }

  .form-input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    background: var(--pure-white);
    font-family: var(--body);
    font-size: 0.9375rem;
    color: var(--dark-gray);
    transition: all 0.25s ease;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--primary-blue);
    background: var(--light-blue);
  }

  .form-input::placeholder {
    color: var(--medium-gray);
  }

  .login-btn {
    width: 100%;
    padding: 0.85rem 1.8rem;
    background: var(--primary-blue);
    color: var(--pure-white);
    border: none;
    font-family: var(--body);
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    margin-top: 0.5rem;
  }

  .login-btn:hover {
    background: var(--dark-blue);
    transform: translateY(-1px);
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .error-message {
    background: #FEE2E2;
    color: #DC2626;
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    margin-bottom: 1rem;
    display: none;
    border-left: 3px solid #DC2626;
  }

  .error-message.show {
    display: block;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .credentials-info {
    background: var(--light-blue);
    border: 1px solid var(--primary-blue);
    padding: 0.875rem 1rem;
    margin-bottom: 1.25rem;
    font-size: 0.8125rem;
  }

  .credentials-info-title {
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dark-blue);
    margin-bottom: 0.5rem;
  }

  .credentials-info-list {
    color: var(--dark-gray);
    line-height: 1.7;
  }

  .login-footer {
    margin-top: 1.5rem;
    text-align: center;
  }

  .back-link {
    font-size: 0.8125rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--medium-gray);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: color 0.25s;
  }

  .back-link:hover {
    color: var(--primary-blue);
  }

  @media (max-width: 480px) {
    body {
      padding: 1rem;
    }

    .login-card {
      padding: 1.5rem;
    }

    .login-title {
      font-size: 1.125rem;
    }
  }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo"><img src="../assets/logo-lvre-removebg-preview.png" alt="LVRE Logo" style="height: 32px;"></div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-subtitle">Masuk ke dashboard admin</p>
    </div>

    <div class="error-message" id="errorMessage">
      Username atau password salah!
    </div>

    <div class="credentials-info">
      <div class="credentials-info-title">Credentials</div>
      <div class="credentials-info-list">
        <strong>Username:</strong> admin &nbsp;|&nbsp; <strong>Password:</strong> admin123
      </div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          type="text"
          id="username"
          class="form-input"
          placeholder="Masukkan username"
          required
          autocomplete="username"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Masukkan password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="login-btn">
        Masuk ke Dashboard
      </button>
    </form>

    <div class="login-footer">
      <a href="../index.html" class="back-link">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Kembali ke Website
      </a>
    </div>
  </div>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  const errorMessage = document.getElementById('errorMessage');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (username === 'admin' && password === 'admin123') {
      sessionStorage.setItem('adminLoggedIn', 'true');
      sessionStorage.setItem('loginTime', new Date().toISOString());
      window.location.href = 'index.html';
    } else {
      errorMessage.classList.add('show');
      usernameInput.value = '';
      passwordInput.value = '';
      usernameInput.focus();

      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 3000);
    }
  });

  window.addEventListener('load', function() {
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
  });
</script>

</body>
</html>
